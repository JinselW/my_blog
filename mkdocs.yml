# 基础信息
site_name: JinselW's blog
site_description: 本人成长过程中留下的碎片
site_author: Jinsel
site_url: https://my-blog-alh.pages.dev/

#仓库
repo_url: https://github.com/JinselW/my_blog
repo_name: JinselW/my_blog
use_directory_urls: false
copyright: Copyright © 2025 Jinsel. Built with MkDocs.

# 导航栏
nav:
  - 首页: index.md
  - 读书记录:
      - 许三观卖血记: 读书记录/许三观卖血记.md
  - 影评：
      - 给阿嬷的情书：影评/给阿嬷的情书.md
# 主题配置
theme:
  name: material
  language: zh
  features:
    - content.action.edit      # 页面右上角显示「编辑此页」按钮
    - content.action.view      # 显示「查看源码」按钮
    - content.code.copy        # 代码块右上角添加复制按钮
    - content.code.annotate    # 代码块支持注释标注
    - content.footnote.tooltips # 脚注悬浮提示
    - header.autohide        # 滚动时自动隐藏顶部导航
    - navigation.indexes       # 文件夹支持生成 index 页
    - navigation.path          # 显示页面路径导航（面包屑）
    - navigation.prune        # 只展开当前目录，折叠其他（提速）
    - navigation.tabs         # 顶部导航使用标签页样式
    - navigation.sections     # 导航分区折叠
    - navigation.top          # 滚动到底部后显示「返回顶部」按钮
    - navigation.tracking     # 导航自动高亮当前所在位置
    - search.share            # 搜索结果支持分享链接
  font:
    text: JetBrains Mono, LXGW WenKai Screen GB Screen
    # 正文字体：等宽英文字体 + 霞鹜文楷（中文美观字体）
    code: JetBrains Mono, Consolas
    # 代码块字体
  icon:
    repo: fontawesome/brands/git-alt
    # 右上角仓库图标
    logo: material/notebook-multiple
    # 网站左上角 Logo 图标
    previous: fontawesome/solid/angle-left
    # 上一页图标
    next: fontawesome/solid/angle-right
    # 下一页图标
  palette:
    - media: "(prefer-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Dark Mode
      # 系统深色模式时，自动启用深色主题
    - media: "(prefer-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Light Mode
      # 系统浅色模式时，自动启用浅色主题
# 插件
plugins:
  - blog:
      draft: false
  # 博客插件，关闭草稿模式（正式发布）
  - search
  # 内置搜索功能（必须开启）
  - git-revision-date-localized:
      type: date
      locale: zh
  - tags

      
# Markdown 扩展
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  # 支持 LaTeX 数学公式（KaTeX）
  - pymdownx.betterem
  # 优化粗体、斜体解析
  - pymdownx.caret
  - pymdownx.tilde
  # 上标、下标、删除线
  - pymdownx.mark
  # 文字高亮 ==内容==
  - pymdownx.highlight
  # 代码块高亮、行号
  - admonition
  # 提示框、警告框、信息框
  - pymdownx.details
  - pymdownx.superfences
  # 可折叠面板
  - pymdownx.tabbed:
      alternate_style: true
  # 标签页切换内容
  - pymdownx.tasklist:
      custom_checkbox: true
  # 任务列表：- [x] 已完成
  - toc:
      permalink: ⚓︎
      title: 目录
  # 右侧目录配置，支持中文锚点链接


