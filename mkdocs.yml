# 基础信息
site_name: 我的小窝~
site_description: 成长记录
site_author: Jinsel
site_url: https://jinsel.github.io/my-blog/ 

# 导航栏
nav:
  - 前页: index.md
  - 读书记录：
   - 许三观卖血记: 许三观卖血记.md
   

# 主题配置
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    logo: material/library
    repo: fontawesome/brands/github

# 插件
plugins:
  - search:
      lang: zh
  - tags:
      tags_file: tags.md
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - git-revision-date-localized:
      type: date
      locale: zh
      format: "%Y-%m-%d"

# Markdown 扩展
markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
      linenums: true
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

# 仓库
repo_name: Jinsel/my-blog
repo_url: https://github.com/Jinsel/my-blog
edit_uri: edit/main/docs/

